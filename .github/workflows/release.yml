name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Pre-flight Secrets Check
        run: |
          MISSING=0
          for SECRET in APPLE_DEVELOPER_ID_P12 APPLE_DEVELOPER_ID_PASSWORD APPLE_ID APPLE_NOTARIZATION_PASSWORD APPLE_TEAM_ID SPARKLE_PRIVATE_KEY; do
            if [ -z "${!SECRET}" ]; then
              echo "::error::Secret $SECRET is missing! Release will fail later."
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then exit 1; fi
        env:
          APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: swift test

      - name: Generate app icon
        run: |
          brew install librsvg
          chmod +x ./assets/generate_icns.sh
          ./assets/generate_icns.sh

      - name: Import signing certificate
        env:
          APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
        run: |
          # Validate secrets are set
          if [ -z "$APPLE_DEVELOPER_ID_P12" ]; then
            echo "::error::APPLE_DEVELOPER_ID_P12 secret is not set"
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          P12_PATH="$RUNNER_TEMP/certificate.p12"

          # Decode the certificate
          echo "$APPLE_DEVELOPER_ID_P12" | base64 --decode > "$P12_PATH"

          # Create and configure the temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set partition list for codesign access
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Extract the signing identity name
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')

          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in certificate"
            exit 1
          fi

          echo "Found signing identity: $IDENTITY"
          echo "APP_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Clean up P12 file
          rm -f "$P12_PATH"

      - name: Build and package
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          chmod +x ./scripts/package.sh
          SIGNING_MODE=developer APP_IDENTITY="$APP_IDENTITY" ./scripts/package.sh release

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          chmod +x ./scripts/create-dmg.sh
          ./scripts/create-dmg.sh "$VERSION"

      - name: Sign DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          codesign --force --timestamp --sign "$APP_IDENTITY" \
            "SymfonyCLIMenuBar-${VERSION}.dmg"

      - name: Notarize DMG
        id: notarization
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          xcrun notarytool submit "SymfonyCLIMenuBar-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Notarization Diagnostics
        if: steps.notarization.outcome == 'failure'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "::error::Notarization failed. Fetching logs..."
          SUBMISSION_ID=$(xcrun notarytool history --apple-id "$APPLE_ID" --password "$APPLE_NOTARIZATION_PASSWORD" --team-id "$APPLE_TEAM_ID" --limit 1 | grep -E '^[0-9a-f-]{36}' | awk '{print $1}')
          if [ -n "$SUBMISSION_ID" ]; then
            echo "Submission ID: $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" --apple-id "$APPLE_ID" --password "$APPLE_NOTARIZATION_PASSWORD" --team-id "$APPLE_TEAM_ID"
          else
            echo "Could not find submission ID in history."
          fi
          exit 1

      - name: Staple notarization ticket
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          xcrun stapler staple "SymfonyCLIMenuBar-${VERSION}.dmg"
          xcrun stapler staple SymfonyCLIMenuBar.app

      - name: Create ZIP
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          zip -r "SymfonyCLIMenuBar-${VERSION}.zip" SymfonyCLIMenuBar.app

      - name: Sign ZIP for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # sign_update is included in the SPM binary artifact fetched by swift build
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY not set — skipping Sparkle signature"
            echo "SPARKLE_SIGNATURE=" >> $GITHUB_ENV
          else
            SIGNATURE=$("$SIGN_UPDATE" \
              "SymfonyCLIMenuBar-${VERSION}.zip" \
              --ed-key "$SPARKLE_PRIVATE_KEY")
            echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          fi

      - name: Update appcast
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -n "$SPARKLE_SIGNATURE" ]; then
            chmod +x ./scripts/update_appcast.sh
            ./scripts/update_appcast.sh \
              "$VERSION" \
              "$SPARKLE_SIGNATURE" \
              "SymfonyCLIMenuBar-${VERSION}.zip"
          else
            echo "Skipping appcast update (no Sparkle signature)"
          fi

      - name: Update website version
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/\"softwareVersion\": \"[^\"]*\"/\"softwareVersion\": \"${VERSION}\"/" docs/web/index.html

      - name: Commit updated appcast and website
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -n "$SPARKLE_SIGNATURE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin main
            git checkout main
            git add docs/appcast.xml docs/web/index.html
            git diff --staged --quiet && echo "No changes to commit" || \
              git commit -m "chore: update appcast and website for v${VERSION}"
            git push origin main
          fi

      - name: Generate checksums
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          shasum -a 256 "SymfonyCLIMenuBar-${VERSION}.dmg" > "SymfonyCLIMenuBar-${VERSION}.dmg.sha256"
          shasum -a 256 "SymfonyCLIMenuBar-${VERSION}.zip" > "SymfonyCLIMenuBar-${VERSION}.zip.sha256"
          echo "Checksums:"
          cat "SymfonyCLIMenuBar-${VERSION}.dmg.sha256"
          cat "SymfonyCLIMenuBar-${VERSION}.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            SymfonyCLIMenuBar-${{ steps.version.outputs.VERSION }}.dmg
            SymfonyCLIMenuBar-${{ steps.version.outputs.VERSION }}.zip
            SymfonyCLIMenuBar-${{ steps.version.outputs.VERSION }}.dmg.sha256
            SymfonyCLIMenuBar-${{ steps.version.outputs.VERSION }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
